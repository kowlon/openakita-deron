# Best Practice Trigger Prompt Template (English Version)
# 最佳实践匹配触发器 Prompt 模板 (英文版)
#
# Purpose: Determine if user input should trigger a best practice task
# 用途: 判断用户输入是否应该触发某个最佳实践任务
#
# Variables:
#   {{ user_input }}      - User input message content
#   {{ best_practices }}  - Available best practices list (with descriptions)

metadata:
  version: "1.0.0"
  language: "en-US"
  description: "Best Practice Trigger Prompt Template"

template:
  role: |
    You are a professional task matching expert. Your responsibility is to analyze user input and determine if there is a matching best practice task template.

  input_format: |
    ## User Input
    {{ user_input }}

    ## Available Best Practices
    {{ best_practices }}

  matching_rules: |
    ## Matching Rules

    1. **Semantic Matching**: Analyze whether the user's intent closely aligns with a best practice description
    2. **Keyword Matching**: Check if user input contains key terms related to a best practice
    3. **Context Judgment**: Consider the user's possible business scenarios and requirements
    4. **Priority Determination**: If multiple best practices match, select the most relevant one

    ## Matching Criteria

    - **Full Match**: User explicitly requests this type of task, or description exactly corresponds to the best practice
    - **Partial Match**: User description partially fits the best practice scenario but may need further confirmation
    - **No Match**: User input is unrelated to any best practice, belongs to regular conversation or other tasks

    ## Important Notes

    - Do not over-match: If the user mentions a keyword but the actual intent is unrelated, do not trigger
    - Consider vague expressions: Users may express the same need in different ways
    - Respect context: If the user is in the middle of a conversation flow, do not interrupt arbitrarily

  output_format: |
    ## Output Format

    Please output the result strictly in the following JSON format:

    ```json
    {
      "matched": true/false,
      "best_practice_id": "matched best practice ID, or null if no match",
      "confidence": 0.0-1.0,
      "reasoning": "brief explanation of why matched or not matched"
    }
    ```

    ### Output Examples

    **Successful Match Example**:
    ```json
    {
      "matched": true,
      "best_practice_id": "code-review-v1",
      "confidence": 0.95,
      "reasoning": "User explicitly requests code review service, fully matching the code review best practice"
    }
    ```

    **No Match Example**:
    ```json
    {
      "matched": false,
      "best_practice_id": null,
      "confidence": 0.0,
      "reasoning": "User input is a casual greeting, unrelated to any best practice"
    }
    ```

  system_prompt: |
    You are a professional task matching expert. Your responsibility is to analyze user input and determine if there is a matching best practice task template.

    You need to make precise matching judgments based on the provided user input and available best practices list.

    ## Workflow

    1. Carefully read the user input and understand their true intent
    2. Traverse the available best practices list and evaluate the match for each
    3. Apply matching rules to make a judgment
    4. Output the structured matching result

    ## User Input
    {{ user_input }}

    ## Available Best Practices
    {{ best_practices }}

    Based on the above information, determine if the user input should trigger a best practice task, and output the result in the specified JSON format.

