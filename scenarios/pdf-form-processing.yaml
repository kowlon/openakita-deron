# PDF 表单处理场景
# 多步骤 PDF 表单处理流程

schema_version: "1.0"

scenario_id: "pdf-form-processing"
name: "PDF 表单处理"
description: "提取、填充和验证 PDF 表单"
category: "document"
version: "1.0"

trigger_patterns:
  - type: regex
    pattern: "(处理|填写|填充).*(PDF|pdf).*(表单|form)"
    priority: 1
  - type: keyword
    keywords:
      - "PDF表单"
      - "填写PDF"
      - "PDF处理"
      - "表单填充"
    priority: 2

steps:
  - step_id: "extract"
    name: "提取表单结构"
    description: "分析 PDF 表单结构，提取表单字段信息"
    output_key: "form_structure"
    tools:
      system_tools:
        - read_file
      skills:
        - pdf
    system_prompt: |
      你是一位 PDF 表单处理专家。请分析提供的 PDF 文件，提取表单结构信息：

      1. **表单字段列表**: 每个字段的名称、类型、位置
      2. **字段属性**: 必填/可选、默认值、验证规则
      3. **表单布局**: 页面分布、字段分组

      输出格式：
      ```json
      {
        "fields": [
          {
            "name": "字段名",
            "type": "text/checkbox/radio/select",
            "required": true/false,
            "page": 1,
            "position": {"x": 0, "y": 0}
          }
        ]
      }
      ```

    requires_confirmation: true

  - step_id: "fill"
    name: "填充表单字段"
    description: "根据用户提供的数据填充表单"
    output_key: "filled_form"
    tools:
      system_tools:
        - read_file
      skills:
        - pdf
    system_prompt: |
      你是一位表单填充专家。基于提取的表单结构和用户提供的数据，填充表单字段。

      ## 表单结构
      {{context.form_structure}}

      请：
      1. 将用户提供的数据映射到对应的表单字段
      2. 验证数据格式是否符合要求
      3. 标记任何缺失的必填字段

    requires_confirmation: true
    dependencies:
      - extract

  - step_id: "verify"
    name: "验证输出"
    description: "验证填充结果，确保数据正确"
    output_key: "verification_result"
    tools:
      system_tools: []
      skills:
        - pdf
    system_prompt: |
      请验证表单填充结果：

      ## 表单结构
      {{context.form_structure}}

      ## 填充结果
      {{context.filled_form}}

      验证内容：
      1. 所有必填字段是否已填写
      2. 数据格式是否正确
      3. 字段值是否在有效范围内

      输出验证报告。

    requires_confirmation: false
    dependencies:
      - extract
      - fill

metadata:
  author: "OpenAkita"
  created_at: "2026-03-04"
  tags:
    - pdf
    - form
    - document