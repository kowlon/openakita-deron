# 数据处理流水线最佳实践
# 使用 4 个 demo skills 演示完整的任务编排流程

schema_version: "1.0"

scenario_id: "data-pipeline"
name: "数据处理流水线"
description: "生成、校验、编辑、追踪数据的完整流程 - 演示多任务编排最佳实践"
category: "best-practice"
version: "1.0"

trigger_patterns:
  - type: keyword
    keywords:
      - "数据处理流水线"
      - "data pipeline"
      - "生成校验数据"
      - "数据处理流程"
    priority: 2
  - type: regex
    pattern: "(生成|创建).*(数据|配置).*(校验|检查|编辑)"
    priority: 1

steps:
  - step_id: "generate"
    name: "生成数据"
    description: "根据用户需求生成结构化数据"
    output_key: "generated_data"
    skills:
      - demo-echo-json
    system_prompt: |
      你是数据生成专家。请根据用户的需求生成结构化的数据。

      工作流程：
      1. 询问用户需要生成什么类型的数据
      2. 确认数据结构和字段要求
      3. 使用 demo-echo-json 技能生成数据

      调用方式：
      使用 run_skill_script 工具：
      - skill_name: "demo-echo-json"
      - script_name: "echo.py"
      - args: ["--json", "{\"你的数据结构\":\"...\"}"]

      输出格式为 JSON，包含 trace_id 便于追踪。
    requires_confirmation: true

  - step_id: "validate"
    name: "数据校验"
    description: "校验生成的数据结构是否符合要求"
    output_key: "validation_result"
    skills:
      - demo-schema-check
    system_prompt: |
      你是数据校验专家。请对上一步生成的数据进行结构校验。

      ## 待校验数据
      {{context.generated_data}}

      校验步骤：
      1. 检查必填字段是否存在
      2. 检查字段类型是否正确
      3. 检查数据格式是否有效

      调用方式：
      使用 run_skill_script 工具：
      - skill_name: "demo-schema-check"
      - script_name: "check.py"
      - args: ["--json", "{\"schema_id\":\"demo_draft_v1\",\"data\":{...}}"]

      输出校验报告，包括通过状态和错误列表。
    requires_confirmation: false
    dependencies:
      - generate

  - step_id: "hash"
    name: "生成数据指纹"
    description: "为原始数据生成唯一指纹，用于后续变更追踪"
    output_key: "original_hash"
    skills:
      - demo-context-hash
    system_prompt: |
      为原始数据生成 SHA256 指纹，用于后续变更追踪。

      ## 原始数据
      {{context.generated_data}}

      调用方式：
      使用 run_skill_script 工具：
      - skill_name: "demo-context-hash"
      - script_name: "hash.py"
      - args: ["--json", "{\"text\":\"<数据内容>\",\"algorithm\":\"sha256\"}"]

      输出指纹值和长度信息。
    requires_confirmation: false
    dependencies:
      - generate

  - step_id: "track_changes"
    name: "变更追踪"
    description: "对比用户编辑前后的数据变更"
    output_key: "change_report"
    skills:
      - demo-json-diff
    system_prompt: |
      用户已完成数据编辑。请对比变更前后的差异。

      ## 原始数据
      {{context.generated_data}}

      ## 原始指纹
      {{context.original_hash}}

      ## 校验结果
      {{context.validation_result}}

      使用 demo-json-diff 对比原始数据与用户编辑后的数据：
      - skill_name: "demo-json-diff"
      - script_name: "diff.py"
      - args: ["--json", "{\"before\":{...},\"after\":{...}}"]

      输出变更报告，包括：
      - 修改的字段
      - 新增的字段
      - 删除的字段
      - 变更路径列表
    requires_confirmation: true
    dependencies:
      - validate
      - hash

metadata:
  author: "OpenAkita Best Practices"
  purpose: "演示数据处理的标准流程：生成→校验→编辑→追踪"
  created_at: "2026-03-05"
  tags:
    - best-practice
    - data
    - pipeline
    - demo
    - multi-step