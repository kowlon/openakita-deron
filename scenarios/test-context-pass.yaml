# 上下文传递测试场景
# 验证步骤间上下文传递机制

schema_version: "1.0"

scenario_id: "test-context-pass"
name: "上下文传递测试"
description: "测试步骤间上下文自动传递功能"
category: "test"
version: "1.0"

trigger_patterns:
  - type: keyword
    keywords:
      - "测试上下文传递"
      - "context pass test"
    priority: 1

steps:
  - step_id: "echo"
    name: "生成 JSON"
    description: "使用 echo 技能生成 JSON 数据"
    output_key: "echo_result"
    skills:
      - demo-echo-json
    system_prompt: |
      请生成一个包含以下字段的 JSON 对象：
      - trace_id: "test-context-001"
      - timestamp: 当前时间戳
      - data: 包含一些测试数据

      直接输出 JSON 格式结果。
    requires_confirmation: false

  - step_id: "hash"
    name: "计算摘要"
    description: "基于上一步输出计算 SHA256 摘要"
    output_key: "hash_result"
    skills:
      - demo-context-hash
    system_prompt: |
      基于上一步的输出计算 SHA256 摘要。

      ## 前置步骤输出
      {{context.echo_result}}

      请对 echo_result 的 JSON 字符串计算摘要。
    requires_confirmation: false
    dependencies:
      - echo

metadata:
  author: "Test Suite"
  created_at: "2026-03-05"
  tags:
    - test
    - context
    - demo