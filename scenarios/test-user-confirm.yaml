# 用户确认测试场景
# 验证用户确认和编辑流程

schema_version: "1.0"

scenario_id: "test-user-confirm"
name: "用户确认测试"
description: "测试用户确认和编辑流程"
category: "test"
version: "1.0"

trigger_patterns:
  - type: keyword
    keywords:
      - "测试用户确认"
      - "user confirm test"
    priority: 1

steps:
  - step_id: "draft"
    name: "生成草稿"
    description: "生成草稿 JSON"
    output_key: "draft"
    skills:
      - demo-echo-json
    system_prompt: |
      请生成一个草稿 JSON，包含以下字段：
      - title: 文档标题
      - bullets: 要点列表（数组）
      - created_at: 创建时间

      示例格式：
      ```json
      {
        "title": "测试文档",
        "bullets": ["要点1", "要点2", "要点3"],
        "created_at": "2026-03-05T00:00:00Z"
      }
      ```
    requires_confirmation: false

  - step_id: "validate"
    name: "校验草稿"
    description: "校验草稿格式"
    output_key: "validation"
    skills:
      - demo-schema-check
    system_prompt: |
      使用 schema demo_draft_v1 校验草稿。

      ## 草稿内容
      {{context.draft}}

      请检查：
      1. title 字段是否存在且为字符串
      2. bullets 字段是否存在且为数组

      输出校验结果。
    requires_confirmation: true
    dependencies:
      - draft

  - step_id: "finalize"
    name: "生成最终版本"
    description: "基于校验结果生成最终版本"
    output_key: "final"
    skills:
      - demo-echo-json
    system_prompt: |
      基于校验结果生成最终版本，添加以下字段：
      - approved: true
      - validated_at: 验证时间

      ## 校验结果
      {{context.validation}}

      ## 原始草稿
      {{context.draft}}

      输出最终 JSON。
    requires_confirmation: false
    dependencies:
      - draft
      - validate

metadata:
  author: "Test Suite"
  created_at: "2026-03-05"
  tags:
    - test
    - confirm
    - demo